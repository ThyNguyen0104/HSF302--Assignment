<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat AI tư vấn hoa</title>
    <link th:href="@{/css/fragments.css}" rel="stylesheet">
    <link th:href="@{/css/chat.css}" rel="stylesheet">
</head>
<body>

<div th:replace="~{customer/fragments/common_elements :: header}"></div>

<main class="chat-page">
    <section class="chat-shell">
        <div class="chat-panel">
            <div class="chat-heading">
                <div>
                    <h2>Chat AI tư vấn sản phẩm hoa</h2>
                </div>
                <a th:href="@{/customer/home}" class="back-link">Về cửa hàng</a>
            </div>

            <div id="chatMessages" class="chat-messages" aria-live="polite">
                <div class="message-row bot">
                    <div class="message-bubble">
                        Xin chào! Bạn muốn tìm loại hoa nào? Bạn có thể hỏi: Hoa nào rẻ nhất, có hoa rose không, hoa nào còn hàng?
                    </div>
                </div>
            </div>

            <div class="suggestions">
                <button type="button" th:each="suggestion : ${suggestions}" th:text="${suggestion}" onclick="sendSuggestion(this.textContent)"></button>
            </div>

            <form id="chatForm" class="chat-form">
                <input id="questionInput" type="text" autocomplete="off" placeholder="Nhập câu hỏi về hoa..." required>
                <button type="submit">Gửi</button>
            </form>
        </div>
    </section>
</main>

<div th:replace="~{customer/fragments/common_elements :: footer}"></div>

<script>
    const chatMessages = document.getElementById('chatMessages');
    const chatForm = document.getElementById('chatForm');
    const questionInput = document.getElementById('questionInput');

    function appendMessage(text, sender, imageUrl, productUrl) {
        const row = document.createElement('div');
        row.className = 'message-row ' + sender;

        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';

        const textBlock = document.createElement('div');
        textBlock.textContent = text;
        bubble.appendChild(textBlock);

        if (imageUrl) {
            const image = document.createElement('img');
            image.className = 'message-flower-image';
            image.src = imageUrl;
            image.alt = 'Hình ảnh sản phẩm hoa';
            bubble.appendChild(image);
        }

        if (productUrl) {
            const productLink = document.createElement('a');
            productLink.className = 'message-product-link';
            productLink.href = productUrl;
            productLink.textContent = 'Xem / mua hoa';
            bubble.appendChild(productLink);
        }

        row.appendChild(bubble);
        chatMessages.appendChild(row);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function setLoading(isLoading) {
        const submitButton = chatForm.querySelector('button');
        submitButton.disabled = isLoading;
        submitButton.textContent = isLoading ? 'Đang trả lời...' : 'Gửi';
    }

    async function askBot(question) {
        appendMessage(question, 'user');
        setLoading(true);

        try {
            const response = await fetch('/customer/chat/ask', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ question })
            });

            if (!response.ok) {
                throw new Error('Request failed');
            }

            const data = await response.json();
            appendMessage(data.answer, 'bot', data.imageUrl, data.productUrl);
        } catch (error) {
            appendMessage('Không thể kết nối chat AI. Vui lòng thử lại sau.', 'bot');
        } finally {
            setLoading(false);
            questionInput.focus();
        }
    }

    function sendSuggestion(question) {
        questionInput.value = question;
        askBot(question);
        questionInput.value = '';
    }

    chatForm.addEventListener('submit', function (event) {
        event.preventDefault();
        const question = questionInput.value.trim();
        if (!question) {
            return;
        }
        questionInput.value = '';
        askBot(question);
    });
</script>

</body>
</html>
